services:
  # -------------------------
  # 1. PostgreSQL (Metadata)
  # -------------------------
  postgres:
    image: postgres:16
    container_name: askdoc_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: askdoc
    ports:
      - "5432:5432" # Expose to localhost
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -------------------------
  # 2. Qdrant (Vectors)
  # -------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: askdoc_qdrant
    restart: always
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # GRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
